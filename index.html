<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Časovač</title>
</head>
<body>


    <div style="width:100%; height:30px; background:#ddd;"><div id="lista" style="width:100%; height:100%; background:red;"></div></div>

    <br>

    <input type="time" id="zadani" value="05:00" style="font-size:40px; display:block; margin:0 auto;">


    <div id="odpocitavadlo" style="text-align:center; font-size:367px; color:red;">05:00</div>


    <button onclick="start()" style="font-size:40px; width:100%;">Start</button>
    <button onclick="stop()" style="font-size:40px; width:100%;">Stop</button>
    <button onclick="reset()" style="font-size:40px; width:100%;">Reset</button>


    <script>
        let chytreodpocitavadlo;
        let zbyva = 0;
        let celkem = 0;




        function format(s){
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
        }




        function aktualizujListu(){

            if(celkem > 0){
                let procenta = (zbyva / celkem) * 100;
                document.getElementById("lista").style.width = procenta + "%";
            }

        }




        function start(){



            if(chytreodpocitavadlo) return;


            if(zbyva === 0){
                let t = document.getElementById("zadani").value.split(":");
                zbyva = (+t[0]) * 60 + (+t[1]);
                celkem = zbyva;
            }


            document.getElementById("odpocitavadlo").textContent = format(zbyva);
            aktualizujListu();


            chytreodpocitavadlo = setInterval(() => {

                if(zbyva > 0){
                    zbyva--;
                    document.getElementById("odpocitavadlo").textContent = format(zbyva);
                    aktualizujListu();
                } else {
                    stop();
                    document.getElementById("odpocitavadlo").textContent = "finitoooo";
                    document.getElementById("lista").style.width = "0%";
                }

            }, 1000);



        }




        function stop(){
            clearInterval(chytreodpocitavadlo);
            chytreodpocitavadlo = null;
        }




        function reset(){
            stop();
            zbyva = 0;
            celkem = 0;
            document.getElementById("odpocitavadlo").textContent = document.getElementById("zadani").value;
            document.getElementById("lista").style.width = "100%";
        }




    </script>





</body>
</html>
